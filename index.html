<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <section class="main">

        <img src="images/logo.png" alt="logo" class="logo">

        <div class="container">
            <div class="section-form">
                <h1 class="main-title">Get your free account</h1>
                <div class="main-text">Try homeWorks BUSINESS free for 15 days. Downgrade to Basic (Free Forever)
                    anytime.
                </div>

                <form method="post" class="order-form" id="form">

                    <div class="form-name form-element">
                        <label for="name">Full Name</label>
                        <div class="div-name">
                            <input type="text" id="name" class="input-name input">
                        </div>
                        <label for="name" class="error-message" id="labelName-error">Заполните поле Full Name</label>
                    </div>

                    <div class="form-username form-element">
                        <label for="username">Your username</label>
                        <div class="div-username">
                            <input type="text" id="username" class="input-username input">
                        </div>
                        <label for="form-username" class="error-message" id="labelUsername-error">Заполните поле Username</label>
                    </div>

                    <div class="form-email form-element">
                        <label for="email">E-mail</label>
                        <div class="div-email">
                            <input type="email" id="email" class="input-email input">
                        </div>
                        <label for="form-email" class="error-message" id="labelEmail-error">Заполните E-mail</label>
                    </div>

                    <div class="form-password form-element">
                        <label for="password">Password</label>
                        <div class="div-password">
                            <input type="password" id="password" class="input-password input">
                        </div>
                        <label for="form-password" class="error-message" id="labelPassword-error">Придумайте пароль</label>
                    </div>

                    <div class="form-repeat-password form-element">
                        <label for="repeat-password">Repeat Password</label>
                        <div class="div-repeat-password">
                            <input type="password" id="repeat-password" class="input-repeat-password input">
                        </div>
                        <label for="form-repeat-password" class="error-message" id="labelRepeatPassword-error">Пароли не совпадают</label>
                    </div>

                    <div class="form-checkbox form-element">
                        <div class="checkbox" id="checkbox">
                            <label for="flag" class="checkbox-label">
                                <input type="checkbox" class="agree" id="flag"> Agree to our Terms of Service and
                                Privacy Statement
                            </label>
                        </div>
                        <label for="form-checkbox" class="error-message" id="labelCheckbox-error">Подтвердите согласие</label>
                    </div>
                </form>

                <div class="sign-up">
                    <button type="button" class="btn" id="sign-up">Sign Up</button>
                </div>

                <div class="link">
                    <a href="#">Already have an account?</a>
                </div>
            </div>

            <div class="decoration">
                <img src="images/rocket.png" alt="Rocket">
            </div>
        </div>

    </section>

    <div class="popup" id="popup">
        <div class="popup-text">
            На вашу почту выслана ссылка, перейдите по ней, чтобы завершить регистрацию
        </div>

        <div class="popup-button-block">
            <button class="popup-btn">OK</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
